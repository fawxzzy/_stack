# Shared defaults for the _stack Codex inbox/worktree runner.
# Per-repo config files should stay thin and normally only declare repo_root,
# adapter_path, and only the runtime-policy overrides that truly differ.

personality = "pragmatic"

[windows]
codex_command = "%USERPROFILE%/.codex/.sandbox-bin/codex.exe"

[runtime_policy]
model = "gpt-5.4"
reasoning = "high"
speed = "standard"
permissions = "workspace-write"
sandbox_mode = "workspace-write"
approval = "never"
web_search = "disabled"

[runner]
poll_interval_seconds = 5
settle_seconds = 2

[exports]
patch = true
bundle = false

[git]
author_name = "Codex Inbox Runner"
author_email = "codex-inbox@local"
