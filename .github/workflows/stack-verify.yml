name: _stack verify

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: stack-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Windows authoritative verify
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: atlas/repos/_stack
    steps:
      - name: Check out exact stack event head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: atlas/repos/_stack
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.23.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Initialize versioned fixture workspace
        shell: pwsh
        run: .\ops\ci\Initialize-StackCiFixtureWorkspace.ps1 -WorkspaceRoot "${{ github.workspace }}" -StackRepoRoot "${{ github.workspace }}\atlas\repos\_stack"

      - name: Verify toolchain
        shell: pwsh
        run: |
          node --version
          pnpm --version

      - name: Run authoritative stack verification
        shell: pwsh
        run: pnpm run codex:stack:verify
